
  name: Run Script
  on:
    workflow_dispatch:
    push:
      branches: [ "main" ]

  jobs:
    run:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: "3.11"
        - run: pip install -r requirements.txt
          if: ${{ hashFiles('requirements.txt') != '' }}
        - run: python codex_register.py
          working-directory: .
